<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Keyword Notifier</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon-48.png" alt="" width="32" height="32">
        <div>
          <h1>X Keyword Notifier</h1>
          <p>Xの投稿欄を見守ります</p>
        </div>
      </header>

      <label class="field">
        <span>通知する文字列</span>
        <input id="keyword" type="text" maxlength="40" autocomplete="off">
      </label>

      <label class="toggle">
        <input id="pageToast" type="checkbox">
        <span>画面内トーストを表示</span>
      </label>

      <label class="toggle">
        <input id="desktopNotifications" type="checkbox">
        <span>ブラウザ通知を表示</span>
      </label>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
